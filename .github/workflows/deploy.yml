name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 12時間ごとに最新記事を取り込み再デプロイ（note RSS の焼き込み更新）
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（進行中のデプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # note の RSS を取得して src/data/posts.json に焼き込む。
      # 失敗してもリポジトリ内の既存 posts.json でビルドは続行できる。
      - name: Fetch latest note posts
        run: npm run fetch:posts
        continue-on-error: true

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
